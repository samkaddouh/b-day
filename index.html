<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riddle time 🧠🌷</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=8">
</head>
<body>
    <div class="hearts-bg"></div>

    <div class="container">
        <h1>hey sirine 🌷</h1>
        <p class="delivered-sub">a little something to think about… 💚</p>

        <div class="buttons">
            <a href="riddle.html" id="open-bday-btn">🧠 riddle time →</a>
        </div>

        <p class="last-update">Last Update: July 15 2026 ✨</p>
    </div>

    <audio id="bg-music" loop autoplay muted>
        <source src="music/beabadoobee - Glue Song (Lyrics).mp3" type="audio/mpeg">
    </audio>

    <button id="music-toggle" onclick="toggleMusic()" title="Toggle music">🔊</button>

    <script>
        let musicPlaying = true
        const music = document.getElementById('bg-music')
        music.muted = true
        music.volume = 0.3
        music.play().then(() => { music.muted = false }).catch(() => {
            document.addEventListener('click', () => {
                music.muted = false
                music.play().catch(() => {})
            }, { once: true })
        })
        function toggleMusic() {
            if (musicPlaying) {
                music.pause(); musicPlaying = false
                document.getElementById('music-toggle').textContent = '🔇'
            } else {
                music.muted = false; music.play(); musicPlaying = true
                document.getElementById('music-toggle').textContent = '🔊'
            }
        }
    </script>
</body>
</html>
