<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flowers delivered 🌷✅</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=7">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
</head>
<body>
    <div class="hearts-bg"></div>

    <div class="container">
        <h1>Flowers: delivered 🌷✅</h1>
        <p class="delivered-sub">now for the real surprise… 💚</p>

        <div class="gif-container">
            <img id="cat-gif" src="https://media.tenor.com/eNHbizSfVb0AAAAj/lovemode-cute.gif" alt="cute character">
        </div>

        <div class="buttons">
            <a href="yes.html" id="open-bday-btn">open your birthday →</a>
        </div>

        <div class="countdown-card countdown-card-index" id="countdown-card">
            <p class="countdown-line" id="cd-headline">officially 26-and-a-half-and-a-bit</p>
            <div class="countdown-grid">
                <div class="cd-unit"><span id="cd-days" class="cd-num">--</span><span class="cd-label">days</span></div>
                <div class="cd-unit"><span id="cd-hours" class="cd-num">--</span><span class="cd-label">hrs</span></div>
                <div class="cd-unit"><span id="cd-mins" class="cd-num">--</span><span class="cd-label">min</span></div>
                <div class="cd-unit"><span id="cd-secs" class="cd-num">--</span><span class="cd-label">sec</span></div>
            </div>
            <p class="countdown-sub" id="cd-subline">27 is just 26 with better taste 🍷</p>
        </div>

        <p class="last-update">Last Update: July 6 2026 ✨</p>
    </div>

    <audio id="bg-music" loop autoplay muted>
        <source src="music/beabadoobee - Glue Song (Lyrics).mp3" type="audio/mpeg">
    </audio>

    <button id="music-toggle" onclick="toggleMusic()" title="Toggle music">🔊</button>

    <script>
        let musicPlaying = true
        const music = document.getElementById('bg-music')
        music.muted = true
        music.volume = 0.3
        music.play().then(() => { music.muted = false }).catch(() => {
            document.addEventListener('click', () => {
                music.muted = false
                music.play().catch(() => {})
            }, { once: true })
        })
        function toggleMusic() {
            if (musicPlaying) {
                music.pause(); musicPlaying = false
                document.getElementById('music-toggle').textContent = '🔇'
            } else {
                music.muted = false; music.play(); musicPlaying = true
                document.getElementById('music-toggle').textContent = '🔊'
            }
        }

        // ===== Countdown (mirrors yes.html) =====
        (function () {
            const target = new Date(2026, 6, 7, 0, 0, 0).getTime()
            const d = document.getElementById('cd-days')
            const h = document.getElementById('cd-hours')
            const m = document.getElementById('cd-mins')
            const s = document.getElementById('cd-secs')
            if (!d) return

            const card = document.getElementById('countdown-card')
            const headEl = document.getElementById('cd-headline')
            const subEl = document.getElementById('cd-subline')
            let tickHandle, rotateHandle
            let birthdayFired = false
            const forcePreview = new URLSearchParams(location.search).get('preview') === 'birthday'

            const tick = () => {
                const diff = target - Date.now()
                if (diff <= 0 || forcePreview) {
                    d.textContent = h.textContent = m.textContent = s.textContent = '00'
                    if (!birthdayFired) {
                        birthdayFired = true
                        fireBirthdayMoment()
                        clearInterval(rotateHandle)
                        clearInterval(tickHandle)
                    }
                    return
                }
                const days = Math.floor(diff / 86400000)
                const hours = Math.floor((diff % 86400000) / 3600000)
                const mins = Math.floor((diff % 3600000) / 60000)
                const secs = Math.floor((diff % 60000) / 1000)
                d.textContent = String(days).padStart(2, '0')
                h.textContent = String(hours).padStart(2, '0')
                m.textContent = String(mins).padStart(2, '0')
                s.textContent = String(secs).padStart(2, '0')
            }
            tick()
            tickHandle = setInterval(tick, 1000)

            const lines = [
                { head: 'officially 26-and-a-half-and-a-bit', sub: "27 is just 26 with better taste 🍷" },
                { head: "the '26 farewell tour' ends in…", sub: 'encore: one (1) year of you, louder 🎤' }
            ]
            let i = 0
            rotateHandle = setInterval(() => {
                if (birthdayFired) return
                i = (i + 1) % lines.length
                headEl.style.opacity = subEl.style.opacity = '0'
                setTimeout(() => {
                    if (birthdayFired) return
                    headEl.textContent = lines[i].head
                    subEl.textContent = lines[i].sub
                    headEl.style.opacity = subEl.style.opacity = '1'
                }, 350)
            }, 5000)

            function fireBirthdayMoment() {
                if (!card) return
                headEl.style.opacity = subEl.style.opacity = '0'
                setTimeout(() => {
                    card.classList.add('birthday-mode', 'birthday-clickable')
                    card.setAttribute('role', 'button')
                    card.setAttribute('tabindex', '0')
                    card.setAttribute('title', 'open your birthday game')
                    const openConstellation = () => { window.location.href = 'games.html?open=constellation' }
                    card.onclick = openConstellation
                    card.onkeydown = (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openConstellation() } }
                    headEl.textContent = "🌷 it's here 🌷"
                    subEl.textContent = 'happy birthday, moon-child ✨'
                    if (!card.querySelector('.birthday-big')) {
                        const big = document.createElement('div')
                        big.className = 'birthday-big'
                        big.innerHTML = '<span class="bd-line">HAPPY BIRTHDAY</span><span class="bd-sub">you\'re 27 💚</span><span class="bd-open">tap to open your gift 🎁 →</span>'
                        const grid = card.querySelector('.countdown-grid')
                        if (grid) grid.insertAdjacentElement('afterend', big)
                        else card.appendChild(big)
                    }
                    headEl.style.opacity = subEl.style.opacity = '1'
                    document.body.classList.add('birthday-glow')
                    birthdayConfetti()
                }, 400)
            }

            function birthdayConfetti() {
                if (typeof confetti !== 'function') return
                const colors = ['#4caf50', '#81c784', '#a5d6a7', '#fff59d', '#ffd54f', '#ffffff']
                confetti({ particleCount: 200, spread: 100, origin: { x: 0.5, y: 0.35 }, colors })
                const end = Date.now() + 5000
                const iv = setInterval(() => {
                    if (Date.now() > end) { clearInterval(iv); return }
                    confetti({ particleCount: 40, angle: 60, spread: 55, origin: { x: 0, y: 0.6 }, colors })
                    confetti({ particleCount: 40, angle: 120, spread: 55, origin: { x: 1, y: 0.6 }, colors })
                }, 350)
            }
        })()
    </script>
</body>
</html>
